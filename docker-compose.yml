services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.6
    container_name: weaviate_ingredient_kb
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"       # embeddings từ sentence-transformers
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure

volumes:
  weaviate_data: